name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

env:
  CARGO_TERM_COLOR: always
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  client:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@nightly
        with:
          components: clippy, rustfmt

      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: client
          cache-on-failure: true

      - name: Format check
        run: cargo fmt -- --check

      - name: Clippy
        run: cargo clippy --release --all-targets --all-features -- -D warnings

      - name: Build
        run: cargo build --release

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: pomme-client-windows
          path: target/release/pomme.exe

  client-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@nightly

      - name: Install Vulkan dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libvulkan-dev libxkbcommon-dev libwayland-dev

      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: client-linux
          cache-on-failure: true

      - name: Build
        run: cargo build --release

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: pomme-client-linux
          path: target/release/pomme

  client-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@nightly

      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: client-macos
          cache-on-failure: true

      - name: Build
        run: cargo build --release

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: pomme-client-macos
          path: target/release/pomme

  launcher-backend:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@nightly
        with:
          components: clippy, rustfmt

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: launcher/src-tauri
          shared-key: launcher
          cache-on-failure: true

      - name: Format check
        working-directory: launcher/src-tauri
        run: cargo fmt -- --check

      - name: Clippy
        working-directory: launcher/src-tauri
        run: cargo clippy --release --all-targets --all-features -- -D warnings

  launcher-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v5
        with:
          version: 9

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: launcher/pnpm-lock.yaml

      - name: Install dependencies
        working-directory: launcher
        run: pnpm install

      - name: Format check
        working-directory: launcher
        run: pnpm format:check

      - name: Lint
        working-directory: launcher
        run: pnpm lint

      - name: Type check
        working-directory: launcher
        run: pnpm exec tsc --noEmit

      - name: Build
        working-directory: launcher
        run: pnpm exec vite build

  launcher-build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@nightly

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: launcher/src-tauri
          shared-key: launcher-build
          cache-on-failure: true

      - uses: pnpm/action-setup@v5
        with:
          version: 9

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: launcher/pnpm-lock.yaml

      - name: Install dependencies
        working-directory: launcher
        run: pnpm install

      - name: Build launcher
        working-directory: launcher
        run: pnpm tauri build

      - name: Upload launcher installer
        uses: actions/upload-artifact@v7
        with:
          name: pomme-launcher-windows
          path: launcher/src-tauri/target/release/bundle/nsis/*.exe
