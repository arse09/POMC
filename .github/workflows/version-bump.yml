name: Version Bump

on:
  pull_request:
    types: [closed]
    branches: [master]

permissions:
  contents: write

jobs:
  bump:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determine bump type from labels
        id: bump
        uses: actions/github-script@v7
        with:
          script: |
            const labels = context.payload.pull_request.labels.map(l => l.name);
            if (labels.includes('major')) return 'major';
            if (labels.includes('minor')) return 'minor';
            if (labels.includes('patch')) return 'patch';
            return 'none';
          result-encoding: string

      - name: Skip if no version label
        if: steps.bump.outputs.result == 'none'
        run: echo "No version label found, skipping"

      - name: Get current version
        if: steps.bump.outputs.result != 'none'
        id: current
        run: |
          VERSION=$(grep '^version' Cargo.toml | head -1 | sed 's/.*"\(.*\)"/\1/')
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Calculate new version
        if: steps.bump.outputs.result != 'none'
        id: new
        uses: actions/github-script@v7
        with:
          script: |
            const current = '${{ steps.current.outputs.version }}';
            const [major, minor, patch] = current.split('.').map(Number);
            const bump = '${{ steps.bump.outputs.result }}';
            if (bump === 'major') return `${major + 1}.0.0`;
            if (bump === 'minor') return `${major}.${minor + 1}.0`;
            return `${major}.${minor}.${patch + 1}`;
          result-encoding: string

      - name: Update versions
        if: steps.bump.outputs.result != 'none'
        run: |
          NEW="${{ steps.new.outputs.result }}"
          sed -i "0,/^version = /s/^version = .*/version = \"$NEW\"/" Cargo.toml
          sed -i "0,/^version = /s/^version = .*/version = \"$NEW\"/" launcher/src-tauri/Cargo.toml
          sed -i "s/\"version\": \"[^\"]*\"/\"version\": \"$NEW\"/" launcher/package.json
          sed -i "s/\"version\": \"[^\"]*\"/\"version\": \"$NEW\"/" launcher/src-tauri/tauri.conf.json

      - name: Commit and tag
        if: steps.bump.outputs.result != 'none'
        run: |
          NEW="${{ steps.new.outputs.result }}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Bump version to $NEW"
          git tag "v$NEW"
          git push origin master --tags
